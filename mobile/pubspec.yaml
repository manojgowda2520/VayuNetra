name: vayunetra
description: AI-powered air pollution reporting for Bengaluru
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State
  provider: ^6.0.5

  # HTTP
  http: ^1.1.0

  # Maps
  google_maps_flutter: ^2.12.0

  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Camera / Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Audio / Voice
  record: ^6.2.0
  audioplayers: ^5.2.1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.66.2

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.0
  path_provider: ^2.1.2
  permission_handler: ^11.1.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  flutter_dotenv: ^5.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env.development
  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
